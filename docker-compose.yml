services:
  # -----------------------------------------------------------------------
  # Backend (FastAPI)
  # -----------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    env_file:
      - backend/.env
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Frontend (Vite/React served by nginx inside the image)
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # nginx reverse proxy (public entry point on :80)
  # Add more `backend` replicas to the upstream block in nginx/nginx.conf
  # for horizontal scaling.
  # -----------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Redis (task store + result cache + user store)
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Prometheus (scrapes /metrics from backend)
  # Dashboard: http://localhost:9090
  # -----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - backend
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Grafana (visualization — pre-wired to Prometheus datasource)
  # Dashboard: http://localhost:3000  (admin / admin by default)
  # -----------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
